name: Feed Update Every 60 Minutes

on:
  schedule:
    - cron: '45 * * * *'
  workflow_dispatch:

concurrency:
  group: feed-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface-hub sentence-transformers scikit-learn numpy feedparser python-dateutil requests

      - name: Cache embedding model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/all-mpnet-base-v2
          key: model-all-mpnet-base-v2-v1

      - name: Download SentenceTransformer model if missing
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          python - <<'EOF'
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id="sentence-transformers/all-mpnet-base-v2",
              local_dir="models/all-mpnet-base-v2",
              local_dir_use_symlinks=False,
          )
          EOF

      - name: Run feed script
        run: python filter_feed.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add filtered.xml
          [ -f index.html ] && git add index.html || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi